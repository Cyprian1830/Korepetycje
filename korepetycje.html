<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korepetycje z matematyki</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f6f2;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  max-width: 700px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.slot {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Korepetycje z matematyki</h1>

<div class="card">
  <h3>Dostępne terminy</h3>
  <div id="slots"></div>
</div>

<script>
const HOURS = ['16:00','17:00','18:00','19:00'];

let slots = JSON.parse(localStorage.getItem("slots") || "{}");

// ===== DEMO DANE =====
function seedDemoData() {
  if (Object.keys(slots).length > 0) return;

  const today = new Date();

  for (let i = 0; i < 3; i++) {
    const d = new Date();
    d.setDate(today.getDate() + i);

    HOURS.forEach(h => {
      const key = d.toDateString() + h;

      slots[key] = {
        date: d.toLocaleDateString(),
        hour: h,
        status: "available"
      };
    });
  }

  localStorage.setItem("slots", JSON.stringify(slots));
}

// ===== RENDER =====
function render() {
  const container = document.getElementById("slots");
  const available = Object.entries(slots).filter(([k,s]) => s.status === "available");

  if (!available.length) {
    container.innerHTML = "Brak terminów 😕";
    return;
  }

  container.innerHTML = available.map(([k,s]) => `
    <div class="slot">
      <div>${s.date} — ${s.hour}</div>
      <button onclick="book('${k}')">Zarezerwuj</button>
    </div>
  `).join("");
}

// ===== BOOK =====
function book(key) {
  slots[key].status = "booked";
  localStorage.setItem("slots", JSON.stringify(slots));
  render();
}

// ===== START =====
seedDemoData();
render();
</script>

</body>
</html>
